apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
data:
  # ============================================================
  # [v2.14] Resource Tracking: label 방식 (기본값)
  # ArgoCD가 리소스를 추적할 때 label을 사용
  # ============================================================
  application.resourceTrackingMethod: "label"

  # ============================================================
  # [v2.14] Repository 설정을 ConfigMap에 직접 정의 (v2 방식)
  # v3에서는 이 방식이 제거됨 → Secret으로 마이그레이션 필요
  # ============================================================
  repositories: |
    - name: demo-repo
      type: git
      url: https://github.com/argoproj/argocd-example-apps.git

  # ============================================================
  # [v2.14] Resource Exclusions: 없음 (기본값)
  # v3에서는 Endpoints, Events 등이 기본 제외됨
  # ============================================================

  # ============================================================
  # [v2.14] Dex 인증 설정 (sub claim 사용)
  # v3에서는 federated_claims.user_id로 변경됨
  # ============================================================
  dex.config: |
    connectors:
      - type: github
        id: github
        name: GitHub
        config:
          clientID: $dex-github-client-id
          clientSecret: $dex-github-client-secret
          orgs:
            - name: my-org

  # ============================================================
  # [v2.14] Helm null 값 허용
  # v3 + Helm 3.17.1에서는 null 값이 에러를 발생시킴
  # ============================================================
