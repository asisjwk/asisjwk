apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: demo
spec:
  project: demo-project

  source:
    repoURL: "https://github.com/argoproj/argocd-example-apps.git"
    targetRevision: HEAD
    path: guestbook

  destination:
    server: "https://kubernetes.default.svc"
    namespace: demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # ============================================================
      # [CHANGE 7] ApplyOutOfSyncOnly 제거
      # ────────────────────────────────────────────────────────────
      # WHY: v3에서 이 옵션 사용 시 orphaned resource 발생 가능
      # BEFORE: - ApplyOutOfSyncOnly=true
      # AFTER: (제거)
      # ============================================================

  # ============================================================
  # [CHANGE 8] CRD ignoreDifferences 추가 (v3 호환)
  # ────────────────────────────────────────────────────────────
  # WHY: v3에서 CRD의 preserveUnknownFields 처리 방식 변경
  #      sync diff 발생 방지를 위해 미리 추가
  # ============================================================
  ignoreDifferences:                                           # ← NEW
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/preserveUnknownFields
