## ============================================================
## [CHANGE 2] Repository 설정: ConfigMap → Secret 마이그레이션
## ────────────────────────────────────────────────────────────
## WHY: v3에서 argocd-cm의 repositories 필드가 완전 제거됨
##      v2.14에서 미리 Secret 방식으로 전환
##
## BEFORE (argocd-cm에 있던 설정):
##   repositories: |
##     - name: demo-repo
##       type: git
##       url: https://github.com/argoproj/argocd-example-apps.git
##
## AFTER (아래 Secret으로 분리):
## ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: repo-demo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository       # ← ArgoCD가 인식하는 라벨
  annotations:
    managed-by: "argocd-migration-v2-to-v3"
type: Opaque
stringData:
  name: demo-repo
  type: git
  url: https://github.com/argoproj/argocd-example-apps.git
  # 프라이빗 레포라면 아래 추가:
  # username: git
  # password: ghp_xxxxxxxxxxxx
