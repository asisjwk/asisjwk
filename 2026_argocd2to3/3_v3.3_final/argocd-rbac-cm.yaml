apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
data:
  # ============================================================
  # [v3.3] RBAC 정책 - Fine-Grained 서브리소스 권한 필수
  # v3에서는 update/delete가 서브리소스에 자동 상속되지 않음
  # logs 접근도 명시적 권한 필수
  # ============================================================
  policy.csv: |
    # === 개발팀 ===
    # 앱 레벨 권한
    p, role:developer, applications, get, */*, allow
    p, role:developer, applications, sync, */*, allow
    p, role:developer, applications, update, */*, allow
    p, role:developer, applications, delete, */*, allow

    # [v3 필수] 서브리소스 명시적 권한
    p, role:developer, applications, update/*, */*, allow
    p, role:developer, applications, delete/*/Pod/*/*, */*, allow

    # [v3 필수] logs 접근 권한
    p, role:developer, logs, get, */*, allow

    # === 운영팀 ===
    p, role:operator, applications, *, */*, allow
    p, role:operator, clusters, get, *, allow
    p, role:operator, repositories, *, *, allow
    p, role:operator, projects, *, *, allow

    # [v3 필수] 서브리소스 + logs
    p, role:operator, applications, update/*, */*, allow
    p, role:operator, applications, delete/*, */*, allow
    p, role:operator, logs, get, */*, allow

    # === 뷰어 ===
    p, role:viewer, applications, get, */*, allow
    p, role:viewer, logs, get, */*, allow

    # 그룹 바인딩
    g, my-org:dev-team, role:developer
    g, my-org:ops-team, role:operator
    g, my-org:readonly, role:viewer

  policy.default: role:viewer
