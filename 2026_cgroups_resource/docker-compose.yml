# docker-compose.yml
services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"  # local 6379 to container 6379

  worker-high:
    build: .
    command: celery -A tasks worker -Q high_priority --loglevel=info
    cpu_shares: 700
    depends_on:
      - redis

  worker-mid:
    build: .
    command: celery -A tasks worker -Q mid_priority --loglevel=info
    cpu_shares: 200
    depends_on:
      - redis

  worker-low:
    build: .
    command: celery -A tasks worker -Q low_priority --loglevel=info
    cpu_shares: 100
    depends_on:
      - redis
